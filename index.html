<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-OZTH - Acceso Seguro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<form class="form" action="login.php" method="POST">
       <div class="logo-container">
         <div class="logo-placeholder">
          <img src="mi-logo.png" alt="Logo C-OZTH">
       </div>
        <h2 class="form-title">C-OZTH</h2>
        <p class="form-subtitle">Acceso al Núcleo Digital</p>
        </div>

    <div class="flex-column">
        <label>ID (Email)</label>
        <div class="inputForm">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"></path></svg>
            <input type="email" name="email" class="input" placeholder="usuario@kukulcao.dev" required>
        </div>
    </div>

    <div class="flex-column">
        <label>Clave de Acceso</label>
        <div class="inputForm">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="password" name="password" id="password" class="input" placeholder="••••••••" required>
            <svg id="togglePassword" style="cursor: pointer;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </div>
    </div>

    <div class="flex-row">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; color: #cbd5e1;">
            <input type="checkbox" style="accent-color: #00f2fe;"> Dispositivo Autorizado
        </label>
        <a href="#" class="span-blue">Recuperar</a>
    </div>

    <button type="submit" class="button-submit">Autorizar Acceso</button>

    <p class="p-center">
        ¿Necesitas acceso? 
        <a href="#" class="span-white">Registrar Plataforma</a>
    </p>
    
    <div class="separator">
        <hr>
        <span>Acceso Seguro SSO</span>
        <hr>
    </div>

    <div class="social-buttons">
        <button type="button" class="btn-social">
            <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" width="18"> Google
        </button>
        <button type="button" class="btn-social">
            <svg width="18" height="18" viewBox="0 0 384 512" fill="white"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
            Apple
        </button>
    </div>
</form>

</html>
