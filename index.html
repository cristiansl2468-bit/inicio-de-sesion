    <main class="main-container">

            </div>

                <label><input type="checkbox"> Dispositivo Autorizado</label>
                <a href="#" class="link-neon">Recuperar</a>
            </div>

            <button type="submit" class="btn-primary">Autorizar Acceso</button>

            <p class="footer-text">¿Necesitas acceso? <a href="#" class="link-white">Registrar Plataforma</a></p>
            
            <div class="separator"><span>Acceso Seguro SSO</span></div>
