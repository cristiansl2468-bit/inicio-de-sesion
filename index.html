<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- 🔥 AQUÍ SE CONECTA EL CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- From Uiverse.io by micaelgomestavares --> 
<form class="form">
    <div class="flex-column">
      <label>Email </label></div>
      <div class="inputForm">
        <svg height="20" viewBox="0 0 32 32" width="20"><path d="m30.853 13.87..."></path></svg>
        <input type="text" class="input" placeholder="Enter your Email">
      </div>
    
    <div class="flex-column">
      <label>Password </label></div>
      <div class="inputForm">
        <svg height="20" viewBox="-64 0 512 512"><path d="m336 512..."></path></svg>        
        <input type="password" class="input" placeholder="Enter your Password">
      </div>
    
    <div class="flex-row">
      <div>
      <input type="checkbox">
      <label>Remember me </label>
      </div>
      <span class="span">Forgot password?</span>
    </div>

    <button class="button-submit">Sign In</button>

    <p class="p">Don't have an account? <span class="span">Sign Up</span></p>
    <p class="p line">Or With</p>

    <div class="flex-row">
      <button class="btn google">Google</button>
      <button class="btn apple">Apple</button>
    </div>

</form>

</body>
</html>
